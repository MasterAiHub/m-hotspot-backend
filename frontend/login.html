<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | M Hotspot</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; text-align: center; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; }
        input { width: 100%; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="glass-card login-card">
            <h2 style="margin-bottom: 10px;">M HOTSPOT</h2>
            <p style="color: #94a3b8; margin-bottom: 30px;">Enter your phone to connect</p>
            
            <div id="phone-section">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" placeholder="e.g., 0712345678">
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="sendOTP()">Send OTP</button>
            </div>

            <div id="otp-section" class="hidden">
                <div class="form-group">
                    <label>Enter 6-digit OTP</label>
                    <input type="text" id="otp" placeholder="XXXXXX">
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="verifyOTP()">Verify & Connect</button>
                <p style="margin-top: 15px; font-size: 0.8rem; color: #94a3b8;">Didn't get code? <a href="#" onclick="location.reload()" style="color: var(--primary);">Try again</a></p>
            </div>

            <p id="msg" style="margin-top: 15px; min-height: 20px;"></p>
        </div>
    </div>
    <script>
        async function sendOTP() {
            const phone = document.getElementById('phone').value;
            const msg = document.getElementById('msg');
            if (!phone) return msg.innerText = "Enter phone number";
            
            try {
                const res = await fetch('/api/v1/auth/send-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone_number: phone})
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('phone-section').classList.add('hidden');
                    document.getElementById('otp-section').classList.remove('hidden');
                    msg.innerText = "OTP sent! (Debug: " + data.otp_debug + ")";
                    msg.style.color = "#00ff00";
                    localStorage.setItem('temp_phone', phone);
                } else {
                    msg.innerText = data.detail || "Error sending OTP";
                    msg.style.color = "red";
                }
            } catch (e) { msg.innerText = "Connection error"; }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp').value;
            const phone = localStorage.getItem('temp_phone');
            const msg = document.getElementById('msg');

            try {
                const res = await fetch('/api/v1/auth/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone_number: phone, otp_code: otp})
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('phone', phone);
                    window.location.href = 'dashboard.html';
                } else {
                    msg.innerText = data.detail || "Invalid OTP";
                    msg.style.color = "red";
                }
            } catch (e) { msg.innerText = "Connection error"; }
        }
    </script>
</body>
</html>
