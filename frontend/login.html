<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Hotspot | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .login-wrap { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container login-wrap">
        <div style="width: 100%;">
            <!-- Logo -->
            <div class="logo-container">
                <div class="logo-main">
                    <span>M</span><i class="fas fa-fire fire"></i><span>HOTSPOT</span>
                </div>
                <div class="logo-sub">Automated Network Gateway</div>
            </div>

            <div class="rewards-section" style="background: var(--card-bg); border: 1px solid var(--border);">
                <div id="phone-section">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="phone" placeholder="e.g. 0712345678">
                    </div>
                    <button class="btn btn-primary" onclick="sendOTP()">Send OTP</button>
                </div>

                <div id="otp-section" class="hidden">
                    <div class="form-group">
                        <label>Verification Code</label>
                        <input type="text" id="otp" placeholder="Enter 6-digit OTP">
                    </div>
                    <button class="btn btn-primary" onclick="verifyOTP()">Verify & Connect</button>
                </div>
                <p id="msg" style="margin-top: 15px; text-align: center; font-size: 0.8rem; min-height: 20px;"></p>
            </div>
        </div>
    </div>
    <script>
        async function sendOTP() {
            const phone = document.getElementById('phone').value;
            const msg = document.getElementById('msg');
            if(!phone) return msg.innerText = "Enter phone number";
            
            try {
                const res = await fetch('/api/v1/auth/send-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone_number: phone})
                });
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('phone-section').classList.add('hidden');
                    document.getElementById('otp-section').classList.remove('hidden');
                    msg.innerText = "OTP sent! (Debug: " + data.otp_debug + ")";
                    msg.style.color = "#10b981";
                    localStorage.setItem('temp_phone', phone);
                } else {
                    msg.innerText = data.detail || "Error";
                    msg.style.color = "#ef4444";
                }
            } catch(e) { msg.innerText = "Connection error"; }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp').value;
            const phone = localStorage.getItem('temp_phone');
            const msg = document.getElementById('msg');

            try {
                const res = await fetch('/api/v1/auth/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone_number: phone, otp_code: otp})
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('phone', phone);
                    window.location.href = 'dashboard.html';
                } else {
                    msg.innerText = "Invalid OTP";
                    msg.style.color = "#ef4444";
                }
            } catch(e) { msg.innerText = "Error"; }
        }
    </script>
</body>
</html>
