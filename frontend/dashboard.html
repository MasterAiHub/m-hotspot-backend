<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | M Hotspot</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: #00ff0033;
            color: #00ff00;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">M HOTSPOT</div>
            <div class="nav-links">
                <span id="user-name">Welcome, User</span>
                <a href="index.html" class="btn btn-outline" onclick="localStorage.clear()">Logout</a>
            </div>
        </nav>

        <header style="margin-top: 40px;">
            <h1>Your Dashboard</h1>
            <div class="status-badge">Connected</div>
        </header>

        <div class="dashboard-grid">
            <div class="glass-card">
                <h3>Time Remaining</h3>
                <div style="font-size: 2.5rem; font-weight: 800; margin: 20px 0;">23:45:12</div>
                <p style="color: #94a3b8;">Plan: ULTRA DAY</p>
            </div>
            <div class="glass-card">
                <h3>Data Usage</h3>
                <div style="font-size: 2.5rem; font-weight: 800; margin: 20px 0;">1.2 GB</div>
                <p style="color: #94a3b8;">Limit: Unlimited</p>
            </div>
            <div class="glass-card">
                <h3>Current Speed</h3>
                <div style="font-size: 2.5rem; font-weight: 800; margin: 20px 0;">5.4 Mbps</div>
                <p style="color: #94a3b8;">Stable Connection</p>
            </div>
        </div>

        <section style="margin-top: 60px;">
            <h2>Recent Sessions</h2>
            <div class="glass-card" style="margin-top: 20px; padding: 0;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead style="border-bottom: 1px solid var(--glass-border);">
                        <tr>
                            <th style="padding: 15px; text-align: left;">Date</th>
                            <th style="padding: 15px; text-align: left;">Duration</th>
                            <th style="padding: 15px; text-align: left;">Data Used</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td style="padding: 15px;">2024-05-28</td>
                            <td style="padding: 15px;">2h 15m</td>
                            <td style="padding: 15px;">450 MB</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</body>
</html>
