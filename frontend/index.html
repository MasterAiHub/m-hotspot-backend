<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Hotspot | Premium Internet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">M HOTSPOT</div>
            <div class="nav-links">
                <a href="login.html" class="btn btn-primary">Connect Now</a>
            </div>
        </nav>

        <section class="hero">
            <h1 class="animate-up">Premium WiFi <br>No Password Needed.</h1>
            <p class="animate-up">Fast, secure, and reliable internet. Just enter your phone number and get connected in seconds.</p>
            <div class="stats animate-up">
                <span id="active-users">142</span> Active Users Online
            </div>
            <div style="margin-top: 40px;">
                <a href="login.html" class="btn btn-primary btn-lg" style="padding: 15px 40px; font-size: 1.2rem;">Get Started</a>
            </div>
        </section>

        <div class="plans-grid">
            <div class="glass-card">
                <div class="tag">MOST POPULAR</div>
                <h4>ULTRA DAY</h4>
                <div class="price">90 KES</div>
                <p>24 Hours • 5 Mbps</p>
            </div>
            <div class="glass-card">
                <div class="tag">BEST SPEED</div>
                <h4>UNLIMITED MAX</h4>
                <div class="price">1450 KES</div>
                <p>30 Days • 10 Mbps</p>
            </div>
        </div>
    </div>
    <script>
        if(localStorage.getItem('token')) window.location.href = 'dashboard.html';
    </script>
</body>
</html>
