services:
  - type: web
    name: m-hotspot-backend
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.app.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: .

  - type: web
    name: m-hotspot-frontend
    env: static
    buildCommand: "" # No build step for static files
    publishPath: frontend
    routes:
      - type: rewrite
        source: /api/*
        destination: https://m-hotspot-backend.onrender.com/api/*
