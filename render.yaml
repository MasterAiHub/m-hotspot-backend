services:
  - type: web
    name: m-hotspot-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: m-hotspot-frontend
    env: static
    buildCommand: "" # No build step for static files
    publishPath: frontend
    routes:
      - type: rewrite
        source: /api/*
        destination: https://m-hotspot-backend.onrender.com/api/*
